    .qtop { display:flex; gap:10px; align-items:flex-start; }
    .qnum { flex:0 0 auto; min-width:38px; height:38px; display:grid; place-items:center; border-radius:12px; background:var(--soft); color:var(--brand-dark); font-weight:800; }
    .qtext { font-weight:700; font-size:17px; }
    .qid { color:var(--muted); font-size:13px; margin-top:3px; }
    .options { display:grid; gap:9px; margin-top:14px; }
    .option { width:100%; text-align:left; display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); background:#fff; border-radius:14px; padding:12px; cursor:pointer; }
    .option:hover { border-color:#c6a57e; }
    .letter { flex:0 0 auto; width:28px; height:28px; display:grid; place-items:center; border-radius:50%; background:#eee5da; font-weight:800; }
    .option.correct { border-color:rgba(21,128,61,.5); background:#edfdf3; }
    .option.correct .letter { background:var(--ok); color:#fff; }
    .option.wrong { border-color:rgba(180,35,24,.45); background:#fff1f0; }

    .feedback { min-height:24px; margin-top:10px; font-weight:700; }

    .feedback.bad { color:var(--bad); }
    .empty { background:var(--card); border:1px dashed var(--line); border-radius:18px; padding:24px; text-align:center; color:var(--muted); }
    @media (max-width:720px) { .wrap { padding:12px; } .stats { grid-template-columns:repeat(2,minmax(0,1fr)); } .toolbar { position:static; } .btn,.tab { padding:10px 11px; } }

var STORAGE_KEY = "quiz_5_sections_v2";
var LETTERS = ["A", "B", "C", "D"];
var activeSection = DATA.length ? DATA[0].id : "";
var searchText = "";
var state = createInitialState();

function byId(id) { return document.getElementById(id); }
function makeKey(sectionId, qid) { return sectionId + "::" + qid; }
function escapeHtml(value) {
  return String(value == null ? "" : value).replace(/[&<>"']/g, function(ch) {
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch];
  });
}
function safeGetStorage() {
  try { return window.localStorage; } catch (e) { return null; }
}
function createInitialState() {
  var order = {};
  var optionOrders = {};
  for (var i = 0; i < DATA.length; i++) {
    var section = DATA[i];
    order[section.id] = [];
    for (var j = 0; j < section.questions.length; j++) {
      var q = section.questions[j];
      order[section.id].push(q.id);
      optionOrders[makeKey(section.id, q.id)] = LETTERS.slice();
    }
  }
  return { order: order, optionOrders: optionOrders, answers: {} };
}
function loadState() {
  var storage = safeGetStorage();
  if (!storage) return;
  try {
    var raw = storage.getItem(STORAGE_KEY);
    if (!raw) return;
    var saved = JSON.parse(raw);
    if (saved && saved.order && saved.optionOrders && saved.answers) { state = saved; }
  } catch (e) {}
}
function saveState() {
  var storage = safeGetStorage();
  if (!storage) return;
  try { storage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}
function shuffle(list) {
  var arr = list.slice();
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
  }
  return arr;
}
function getSection() {
  for (var i = 0; i < DATA.length; i++) if (DATA[i].id === activeSection) return DATA[i];
  return DATA[0];
}
function getQuestion(section, qid) {
  for (var i = 0; i < section.questions.length; i++) if (String(section.questions[i].id) === String(qid)) return section.questions[i];
  return null;
}
function matchesSearch(section, q) {
  if (!searchText) return true;
  var haystack = [section.title, q.id, q.q, q.opts.A, q.opts.B, q.opts.C, q.opts.D].join(" ").toLowerCase();
  return haystack.indexOf(searchText.toLowerCase()) !== -1;
}
function renderTabs() {
  var html = "";
  for (var i = 0; i < DATA.length; i++) {
    var s = DATA[i];
    html += '<button type="button" class="tab ' + (s.id === activeSection ? 'active' : '') + '" data-section="' + escapeHtml(s.id) + '">' + escapeHtml(s.title) + ' · ' + s.questions.length + '</button>';
  }
  byId('tabs').innerHTML = html;
}
function render() {
  renderTabs();
  var section = getSection();
  var ids = state.order[section.id] || [];
  var html = '<div class="section-head"><h2>' + escapeHtml(section.title) + '</h2><span class="muted">' + section.questions.length + ' câu</span></div>';
  var count = 0;
  for (var i = 0; i < ids.length; i++) {
    var q = getQuestion(section, ids[i]);
    if (!q || !matchesSearch(section, q)) continue;
    count++;
    var k = makeKey(section.id, q.id);
    var picked = state.answers[k] || "";
    var isRight = picked && picked === q.answer;
    var optionOrder = state.optionOrders[k] || LETTERS;
    html += '<article class="qcard"><div class="qtop"><div class="qnum">' + count + '</div><div><div class="qtext">' + escapeHtml(q.q) + '</div><div class="qid">ID: ' + escapeHtml(q.id) + '</div></div></div><div class="options">';
    for (var j = 0; j < optionOrder.length; j++) {
      var letter = optionOrder[j];
      var cls = "";
      if (picked === letter) cls = (letter === q.answer ? " correct" : " wrong");
      html += '<button type="button" class="option' + cls + '" data-section="' + escapeHtml(section.id) + '" data-qid="' + escapeHtml(q.id) + '" data-letter="' + letter + '"><span class="letter">' + letter + '</span><span>' + escapeHtml(q.opts[letter]) + '</span></button>';
    }
    var feedback = "";
    var fcls = "";
    if (picked) { feedback = isRight ? "Đúng." : "Sai. Bạn chọn " + picked + "."; fcls = isRight ? " ok" : " bad"; }
    html += '</div><div class="feedback' + fcls + '">' + escapeHtml(feedback) + '</div></article>';
  }
  if (count === 0) html = '<div class="empty">Không tìm thấy câu hỏi phù hợp.</div>';
  byId('app').innerHTML = html;
  updateStats();
}
function updateStats() {
  var section = getSection();
  var done = 0, right = 0;
  for (var i = 0; i < section.questions.length; i++) {
    var q = section.questions[i];
    var picked = state.answers[makeKey(section.id, q.id)];
    if (picked) { done++; if (picked === q.answer) right++; }
  }
  byId('activeLabel').textContent = section.title;
  byId('done').textContent = done;
  byId('total').textContent = section.questions.length;
  byId('right').textContent = right;
  byId('wrong').textContent = done - right;
  byId('score').textContent = done ? Math.round((right / done) * 100) : 0;
}
document.addEventListener('click', function(e) {
  var btn = e.target.closest ? e.target.closest('button') : null;
  if (!btn) return;
  if (btn.className.indexOf('tab') !== -1) { activeSection = btn.getAttribute('data-section'); render(); window.scrollTo(0, 0); return; }
  if (btn.className.indexOf('option') !== -1) {
    var k = makeKey(btn.getAttribute('data-section'), btn.getAttribute('data-qid'));
    state.answers[k] = btn.getAttribute('data-letter');
    saveState(); render(); return;
  }
});
byId('shuffleQuestions').onclick = function() {
  var section = getSection();
  state.order[section.id] = shuffle(state.order[section.id] || section.questions.map(function(q) { return q.id; }));
  saveState(); render();
};
byId('shuffleAnswers').onclick = function() {
  var section = getSection();
  for (var i = 0; i < section.questions.length; i++) {
    var q = section.questions[i];
    state.optionOrders[makeKey(section.id, q.id)] = shuffle(LETTERS);
  }
  saveState(); render();
};
byId('resetCurrent').onclick = function() {
  if (!confirm('Làm lại đề đang xem?')) return;
  var section = getSection();
  for (var i = 0; i < section.questions.length; i++) delete state.answers[makeKey(section.id, section.questions[i].id)];
  saveState(); render();
};
byId('resetAll').onclick = function() {
  if (!confirm('Xoá toàn bộ tiến độ của 5 đề?')) return;
  state = createInitialState();
  saveState(); render();
};
byId('search').oninput = function(e) { searchText = e.target.value.replace(/^\s+|\s+$/g, ''); render(); };
loadState();
render();
</script>
